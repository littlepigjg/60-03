<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房间 - 屏幕共享标注工具</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="room-header">
  <div class="room-header-left">
    <div id="roomBadge" class="room-badge" title="点击复制房间码">
      房间码: <code id="roomCodeText">------</code>
    </div>
    <span id="roleTag" class="role-tag"></span>
    <span id="connStatus" class="role-tag" style="background:#6b7280;color:#fff;">连接中</span>
  </div>
  <div class="room-header-right">
    <div id="recordingControls" class="recording-controls" style="display:none;">
      <div id="recordingIndicator" class="recording-indicator">
        <span class="rec-dot"></span>
        <span id="recordingTimer">00:00:00</span>
      </div>
      <button id="pauseRecBtn" class="icon-btn" title="暂停录制">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <span>暂停</span>
      </button>
      <button id="stopRecBtn" class="icon-btn danger" title="停止录制">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
        <span>停止</span>
      </button>
    </div>
    <button id="audioBtn" class="icon-btn" title="语音">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      <span>麦克风</span>
    </button>
    <button id="recordBtn" class="icon-btn" title="录制屏幕">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
      <span>录制</span>
    </button>
    <button id="leaveBtn" class="icon-btn danger" title="离开房间">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>离开</span>
    </button>
  </div>
</header>

<main class="room-main">
  <section class="video-area" id="videoArea">
    <video id="videoPlayer" autoplay playsinline muted></video>
    <canvas id="annotCanvas" class="annotation-canvas"></canvas>
    <div id="waitingScreen" class="waiting-screen">
      <div class="spinner"></div>
      <h3 id="waitTitle">正在初始化...</h3>
      <p id="waitSubtitle">请稍候</p>
    </div>
  </section>

  <aside class="sidebar">
    <div class="sidebar-section">
      <h4>标注工具</h4>
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pen" title="画笔">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
          画笔
        </button>
        <button class="tool-btn" data-tool="arrow" title="箭头">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          箭头
        </button>
        <button class="tool-btn" data-tool="circle" title="画圈">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
          画圈
        </button>
        <button class="tool-btn" data-tool="rect" title="矩形">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          矩形
        </button>
        <button class="tool-btn" data-tool="line" title="直线">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="20" y2="4"/></svg>
          直线
        </button>
        <button class="tool-btn" data-tool="eraser" title="橡皮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16a2 2 0 0 1 0-3l11-11a2 2 0 0 1 3 0l4 4a2 2 0 0 1 0 3L11 20"/></svg>
          橡皮
        </button>
      </div>

      <div class="color-row">
        <div class="color-swatch active" style="background:#ef4444" data-color="#ef4444"></div>
        <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
        <div class="color-swatch" style="background:#10b981" data-color="#10b981"></div>
        <div class="color-swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
        <div class="color-swatch" style="background:#8b5cf6" data-color="#8b5cf6"></div>
        <div class="color-swatch" style="background:#111827" data-color="#111827"></div>
      </div>

      <div class="stroke-row">
        <label>粗细</label>
        <input id="strokeSlider" type="range" min="1" max="12" value="3">
        <span id="strokeValue" class="stroke-value">3</span>
      </div>

      <div class="action-row">
        <button id="undoBtn" class="small-btn">撤销</button>
        <button id="clearBtn" class="small-btn danger">清空全部</button>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <h4>参与人员 (<span id="partCount">0</span>)</h4>
      <ul id="partList" class="participant-list"></ul>
    </div>
  </aside>
</main>

<div id="previewModal" class="modal-overlay" style="display:none;">
  <div class="modal-dialog">
    <div class="modal-header">
      <h3>录制预览</h3>
      <button id="closePreviewBtn" class="modal-close" title="关闭">&times;</button>
    </div>
    <div class="modal-body">
      <video id="previewVideo" class="preview-video" controls></video>
      <div class="preview-info">
        <div class="info-row">
          <span class="info-label">录制时长</span>
          <span id="previewDuration" class="info-value">--:--:--</span>
        </div>
        <div class="info-row">
          <span class="info-label">原始大小</span>
          <span id="previewSize" class="info-value">--</span>
        </div>
      </div>
      <div class="download-options">
        <h4>下载设置</h4>
        <div class="option-row">
          <label class="option-label">视频格式</label>
          <div class="format-options">
            <label class="radio-option">
              <input type="radio" name="format" value="webm" checked>
              <span>WEBM</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="format" value="mp4">
              <span>MP4</span>
            </label>
          </div>
        </div>
        <div class="option-row">
          <label class="option-label">视频质量</label>
          <select id="qualitySelect" class="quality-select">
            <option value="high">高画质</option>
            <option value="medium" selected>中等画质</option>
            <option value="low">低画质</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="cancelDownloadBtn" class="small-btn">取消</button>
      <button id="downloadBtn" class="small-btn btn-primary">下载视频</button>
    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/signaling.js"></script>
<script src="/js/webrtc.js"></script>
<script src="/js/annotation.js"></script>
<script src="/js/recorder.js"></script>
<script src="/js/room.js"></script>
</body>
</html>
